<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - GL Tech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo-container">
    <img src="imagens/Logo GLTech.png" alt="Logo GL Tech" class="logo">
    <h1 class="logo-text">GL Tech</h1>
  </div>
  <nav>
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="redes.html">Redes</a>
    <a href="contato.html">Fale Conosco</a>
  </nav>
</header>

<main>
  <h2>Entre em Contato</h2>
  
  <div class="form-container glass-card">
    <form>
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="mensagem">Como podemos te ajudar?</label>
        <textarea id="mensagem" name="mensagem" placeholder="Sua mensagem..." required></textarea>
      </div>

      <button type="submit">Enviar Mensagem</button>
    </form>
  </div>

  <div class="whatsapp-container">
    <p>Ou se preferir, mande uma mensagem direta:</p>
    <a href="https://wa.me/5521972690466" target="_blank" class="whatsapp-btn">
      Falar no WhatsApp
    </a>
  </div>
</main>

<footer>
  <p>© 2026 GL Tech</p>
</footer>
</body>
</html>
